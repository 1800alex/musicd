name: Build Android App

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Git LFS Pull
        run: git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Enable Corepack
        run: corepack enable

      - name: Generate Nuxt static output
        run: make frontend

      - name: Sync Capacitor to Android
        run: make cap-sync-android

      - name: Build APK
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
