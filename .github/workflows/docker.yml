name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Git LFS Pull
        run: git lfs pull

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (musicd)
        id: meta-musicd-db
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha

      - name: Extract metadata (musicd)
        id: meta-musicd
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha

      - name: Extract metadata (musicplayerd)
        id: meta-musicplayerd
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-musicplayerd
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha

      - name: Build and push musicd-db image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-musicd-db.outputs.tags }}
          labels: ${{ steps.meta-musicd-db.outputs.labels }}

      - name: Build and push musicd image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-musicd.outputs.tags }}
          labels: ${{ steps.meta-musicd.outputs.labels }}

      - name: Build and push musicplayerd image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.musicplayerd
          push: true
          tags: ${{ steps.meta-musicplayerd.outputs.tags }}
          labels: ${{ steps.meta-musicplayerd.outputs.labels }}
