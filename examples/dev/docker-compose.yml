version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    restart: unless-stopped
    environment:
      POSTGRES_DB: musicdb
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_user -d musicdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  musicd:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://music_user:music_pass@db:5432/musicdb?sslmode=disable
      - MUSIC_DIR=/music/
      - PLAYLISTS_DIR=/music/
    volumes:
      - /path/to/your/music:/music

  musicplayerd:
    build:
      context: .
      dockerfile: Dockerfile.musicplayerd
    depends_on:
      - musicd
    restart: unless-stopped
    environment:
      - MUSICD_URL=http://musicd:8080
      - SESSION_NAME=docker-player
      - AUDIO_DEVICE=auto
      - AUDIO_VOLUME=80
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      # Streaming (uncomment to enable)
      # - STREAM_ENABLED=true
      # - STREAM_HTTP_PORT=8090
      # - STREAM_RTP_DEST=rtp://239.0.0.1:5004
    volumes:
      # Mount host PulseAudio/PipeWire socket for local audio output
      - /run/user/1000/pulse/native:/run/user/1000/pulse/native
      # Persist session ID across container restarts
      - musicplayerd_data:/var/lib/musicplayerd
    # ports:
    #   - "8090:8090"
    #   - "5004:5004/udp"

volumes:
  postgres_data:
  musicplayerd_data:
