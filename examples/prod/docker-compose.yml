version: "3.8"

services:
  db:
    image: ghcr.io/1800alex/musicd-db:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: musicdb
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_pass
    volumes:
      - /home/alex/data/music/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_user -d musicdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  musicd:
    image: ghcr.io/1800alex/musicd:latest
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Run as specified uid:gid (default 1000:1000). Override with: docker-compose -e MUSICD_UID=1001 -e MUSICD_GID=1001
    user: "${MUSICD_UID:-1000}:${MUSICD_GID:-1000}"
    environment:
      - DATABASE_URL=postgres://music_user:music_pass@db:5432/musicdb?sslmode=disable
      - MUSIC_DIR=/music/
      - PLAYLISTS_DIR=/music/
      - MUSICD_UID=${MUSICD_UID:-1000}
      - MUSICD_GID=${MUSICD_GID:-1000}
    volumes:
      - /home/alex/Music/Playlists:/music
    networks:
      - default
      - caddy
    labels:
      caddy: "music.kneepull.duckdns.org:80"
      caddy.reverse_proxy: "{{upstreams 8000}}"

  musicplayerd:
    image: ghcr.io/1800alex/musicd-musicplayerd:latest
    depends_on:
      - musicd
    restart: unless-stopped
    environment:
      - MUSICD_URL=http://musicd:8080
      - SESSION_NAME=docker-player
      - AUDIO_DEVICE=auto
      - AUDIO_VOLUME=80
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      # Streaming (uncomment to enable)
      # - STREAM_ENABLED=true
      # - STREAM_HTTP_PORT=8090
      # - STREAM_RTP_DEST=rtp://239.0.0.1:5004
    volumes:
      # Mount host PulseAudio/PipeWire socket for local audio output
      - /run/user/1000/pulse/native:/run/user/1000/pulse/native
      # Persist session ID across container restarts
      - /home/alex/data/music/musicplayerd:/var/lib/musicplayerd
    # ports:
    #   - "8090:8090"
    #   - "5004:5004/udp"
